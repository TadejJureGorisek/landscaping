
<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icarus Landscaping</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Icarus Landscaping</h1>
<form id="contactForm">
<input type="text" id="name" placeholder="Ime" required>
<input type="text" id="contact" placeholder="Telefon ali e‑pošta" required>
<select id="service">
<option>Košnja trave</option>
<option>Obrezovanje grmovnic</option>
<option>Kidanje snega</option>
</select>
<textarea id="message" placeholder="Sporočilo"></textarea>
<button type="submit">Pošlji povpraševanje</button>
<p id="status"></p>
</form>
</div>
<script src="script.js"></script>
</body>
</html>
